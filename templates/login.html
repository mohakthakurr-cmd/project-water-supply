<!DOCTYPE html>
<html>
<head>

<title>Admin Login</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f7fb;
}

.container{
    width:350px;
    margin:120px auto;
    background:white;
    padding:35px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    color:#1565c0;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    background:#1565c0;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0d47a1;
}

.error{
    color:red;
    text-align:center;
    margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>Admin Login</h2>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

</form>

</div>

</body>
</html>
